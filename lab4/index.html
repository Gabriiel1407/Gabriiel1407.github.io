<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Sign Up Form </h1>
    

    <fieldset>
        <legend>Sign Up</legend>
        First Name: <input type="text"><br> 
        Last Name: <input type="text"><br> 
        Email: <input type="text"><br> 
        Phone Number:<input type="text"><br><br>
        Zip Code: <input id="zipCodeInput" type="text">
        <span id="zipMessage"></span><br>
        <p>City: <span id="city"></span></p><br>
        <p>Latitude: <span id="latitude"></span></p><br>
        <p>Longitude: <span id="longitude"></span></p><br>
        State:  <select id="state"></select><br>
        Select a County: <select id="county"></select><br>
        <br>
        Desired Username: <input id="username" type="text">
        <span id="usernameMessage"></span><br>
        Password: <input id="password" type="password">
        <span id="passwordSuggestion"></span><br>
        Type Password Again: <input id="password2" type="password"><br>
        <input id="submitBtn" type="submit" value="Sign up!">
    </fieldset>

    <script src="js/script.js"></script>
</body>
</html>
